<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - iEduReach</title>
  <link rel="stylesheet" href="style.css"> <!-- Link your CSS -->
</head>
<body>

  <!-- Contact Form Section -->
  <section class="contact-form">
    <div class="container">
        <img src="assets/logo.png" alt="Logo" class="logo"> <!-- Add your logo here -->
        <h2>Let's Connect</h2>
        <p>Fill out the form below, and we will get back to you as soon as possible.</p>

        <!-- Contact form with the correct id -->
        <form id="contact-form">
            <div class="form-group">
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="full-name" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="institution">Institution Name:</label>
                <input type="text" id="institution" name="institution" required>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2.4.0/dist/email.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
